<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WEBFIN</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WEBFIN">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="theme-color" content="#FFD600">

    <style id="style-orientacao">@page { size: portrait; margin: 10mm; }</style>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace !important; }
        body { background-color: #121212; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        
        #app-container {
            width: 100%; max-width: 400px; height: 100dvh;
            background-color: #FFD600; /* Amarelo Base */
            position: relative; display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }

        .view { display: none; height: 100%; width: 100%; flex-direction: column; overflow: hidden; }
        .view.active { display: flex; animation: fadeIn 0.15s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER OTIMIZADO */
        .header { 
            flex-shrink: 0; background-color: #1b5e20; 
            padding: 10px 15px; border-bottom: 3px solid #0a3916;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 1.2rem; color: #FFD600; font-weight: bold; }
        .header-acoes { display: flex; gap: 8px; align-items: center; }
        
        .btn-header { 
            height: 38px; padding: 0 12px; border-radius: 4px; font-weight: bold; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center; border: none; cursor: pointer;
            background: #FFD600; color: #1b5e20;
        }

        .view-scroll { flex: 1; overflow-y: auto; padding: 20px; }

        /* Grid */
        .launcher-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .app-icon { background: rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #1b5e20; }
        .app-icon:active { background: rgba(255,255,255,0.5); }
        .app-icon h2 { font-size: 0.5rem; margin-top: 5px; font-weight: bold; color: #1b5e20; text-align: center; }
        .icon-symbol { font-size: 1.8rem; }

        /* Estilização Geral de Formulários e Componentes para manter o tema Brasil */
        .form-control { border: 2px solid #1b5e20 !important; background: #fff !important; }
        .btn-executar { background: #1b5e20 !important; color: #FFD600 !important; }

        /* Impressão */
        @media print {
            body, html, #app-container { background: #fff !important; }
            .view { display: none !important; }
            #view-print-preview { display: block !important; }
        }
    </style>
</head>
<body>
    <div id="app-container">
        </div>
</body>
</html>
